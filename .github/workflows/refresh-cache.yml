name: Refresh Cache Data

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to refresh cache files in
        required: false
        default: main
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || vars.CACHE_UPDATE_BRANCH || 'main' }}
      CACHE_SPREADSHEET_URL: ${{ vars.CACHE_SPREADSHEET_URL }}
      CACHE_RUSSIA_COMPANIES_SHEET: ${{ vars.CACHE_RUSSIA_COMPANIES_SHEET }}
      CACHE_RUSSIA_LIMITS_SHEET: ${{ vars.CACHE_RUSSIA_LIMITS_SHEET }}
      GOOGLE_AUTH_PATH: auth.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.target_branch || vars.CACHE_UPDATE_BRANCH || 'main' }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_AUTH_JSON_BASE64: ${{ secrets.GOOGLE_AUTH_JSON_BASE64 }}
          GOOGLE_AUTH_JSON: ${{ secrets.GOOGLE_AUTH_JSON }}
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          value_base64 = os.environ.get("GOOGLE_AUTH_JSON_BASE64", "").strip()
          value_json = os.environ.get("GOOGLE_AUTH_JSON", "").strip()

          if value_base64:
              decoded = base64.b64decode(value_base64)
              Path("auth.json").write_bytes(decoded)
          elif value_json:
              Path("auth.json").write_text(value_json)
          else:
              raise RuntimeError("Set GOOGLE_AUTH_JSON_BASE64 or GOOGLE_AUTH_JSON secret")

          print(f"auth.json size: {Path('auth.json').stat().st_size} bytes")
          PY

      - name: Refresh cache files
        run: python cache.py

      - name: Commit updated cache
        run: |
          echo "Refreshing cache in branch: ${TARGET_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data1.json data3.json data_us.json
          git status --short
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh cache data"
          git push origin "HEAD:${TARGET_BRANCH}"
