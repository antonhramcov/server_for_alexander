name: Refresh Cache Data

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to refresh cache files in
        required: false
        default: main
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || vars.CACHE_UPDATE_BRANCH || 'main' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || vars.CACHE_UPDATE_BRANCH || 'main' }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_AUTH_JSON_BASE64: ${{ secrets.GOOGLE_AUTH_JSON_BASE64 }}
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          value = os.environ["GOOGLE_AUTH_JSON_BASE64"]
          if not value:
              raise RuntimeError("GOOGLE_AUTH_JSON_BASE64 secret is empty or missing")
          Path("auth.json").write_bytes(base64.b64decode(value))
          PY

      - name: Refresh cache files
        env:
          GOOGLE_AUTH_PATH: auth.json
        run: python cache.py

      - name: Commit updated cache
        run: |
          echo "Refreshing cache in branch: ${TARGET_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data1.json data3.json data_us.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh cache data"
          git push origin "HEAD:${TARGET_BRANCH}"
