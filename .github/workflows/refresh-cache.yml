name: Refresh Cache Data

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to refresh cache files in
        required: false
        default: main
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || vars.CACHE_UPDATE_BRANCH || 'main' }}
      CACHE_SPREADSHEET_URL: ${{ vars.CACHE_SPREADSHEET_URL }}
      CACHE_RUSSIA_COMPANIES_SHEET: ${{ vars.CACHE_RUSSIA_COMPANIES_SHEET }}
      CACHE_RUSSIA_LIMITS_SHEET: ${{ vars.CACHE_RUSSIA_LIMITS_SHEET }}
      GOOGLE_AUTH_PATH: auth.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.target_branch || vars.CACHE_UPDATE_BRANCH || 'main' }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_AUTH_JSON_BASE64: ${{ secrets.GOOGLE_AUTH_JSON_BASE64 }}
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          value = os.environ["GOOGLE_AUTH_JSON_BASE64"]
          print(f"GOOGLE_AUTH_JSON_BASE64 length: {len(value)}")
          if not value:
              raise RuntimeError("GOOGLE_AUTH_JSON_BASE64 secret is empty or missing")
          decoded = base64.b64decode(value)
          Path("auth.json").write_bytes(decoded)
          print(f"auth.json size: {len(decoded)} bytes")
          PY

      - name: Refresh cache files
        run: python cache.py

      - name: Commit updated cache
        run: |
          echo "Refreshing cache in branch: ${TARGET_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data1.json data3.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh cache data"
          git push origin "HEAD:${TARGET_BRANCH}"
